<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4f46e5">
  <title>Lenn's Schlaf-Tracker</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card-soft: #273449;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --sleep: #6366f1;
      --sleep-dark: #4f46e5;
      --wake: #f59e0b;
      --wake-dark: #d97706;
      --manual: #334155;
      --danger: #ef4444;
      --radius: 18px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 16px 48px;
      max-width: 560px;
      margin: 0 auto;
    }
    header { text-align: center; margin-bottom: 24px; }
    header h1 { font-size: 1.5rem; margin: 0 0 4px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    header p { color: var(--muted); margin: 0; font-size: 0.9rem; }

    .status {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
      text-align: center;
    }
    .status .big { font-size: 1.15rem; font-weight: 700; }
    .status .sub { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }
    .status .duration { font-size: 1.6rem; font-weight: 800; margin-top: 6px; letter-spacing: 0.02em; }
    .status.sleeping .duration { color: var(--sleep); }
    .status.awake .duration { color: var(--wake); }

    .buttons { display: grid; gap: 12px; margin-bottom: 28px; }
    button.action {
      border: none;
      border-radius: var(--radius);
      padding: 22px 16px;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.08s ease, filter 0.15s ease;
    }
    button.action:active { transform: scale(0.97); filter: brightness(1.1); }
    .btn-sleep { background: linear-gradient(135deg, var(--sleep), var(--sleep-dark)); }
    .btn-wake  { background: linear-gradient(135deg, var(--wake), var(--wake-dark)); }
    .btn-manual {
      background: var(--manual);
      font-size: 1rem;
      padding: 16px;
    }
    .icon { font-size: 1.4rem; }

    h2 { font-size: 1.05rem; margin: 0 0 12px; color: var(--muted); font-weight: 600; }

    /* Chart */
    .chart-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 28px; }
    .chart-legend { display: flex; gap: 16px; justify-content: center; margin-bottom: 14px; font-size: 0.82rem; color: var(--muted); }
    .chart-legend span { display: inline-flex; align-items: center; gap: 6px; }
    .swatch { width: 14px; height: 14px; border-radius: 4px; display: inline-block; }
    .swatch.sleep { background: var(--sleep); }
    .swatch.wake { background: var(--wake); }
    .timeline {
      position: relative; height: 34px; border-radius: 8px; overflow: hidden;
      background: var(--card-soft);
    }
    .seg-block { position: absolute; top: 0; bottom: 0; }
    .seg-block.sleep { background: var(--sleep); }
    .seg-block.wake { background: var(--wake); }
    .axis { position: relative; height: 16px; margin-top: 4px; }
    .tick { position: absolute; transform: translateX(-50%); font-size: 0.65rem; color: var(--muted); }
    .chart-empty { color: var(--muted); text-align: center; font-size: 0.85rem; padding: 8px 0; }

    .entries { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
    .entry {
      background: var(--card);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .entry .dot {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .dot.sleep { background: rgba(99,102,241,0.2); }
    .dot.wake  { background: rgba(245,158,11,0.2); }
    .entry .info { flex: 1; min-width: 0; }
    .entry .type { font-weight: 600; }
    .entry .time { color: var(--muted); font-size: 0.85rem; }
    .entry .del {
      background: none; border: none; color: var(--muted);
      font-size: 1.3rem; cursor: pointer; padding: 6px 8px; border-radius: 8px;
    }
    .entry .del:active { color: var(--danger); background: rgba(239,68,68,0.12); }
    .empty { color: var(--muted); text-align: center; padding: 24px; font-size: 0.9rem; }

    .day-header {
      margin: 18px 0 6px; font-size: 0.8rem; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--muted); font-weight: 700;
    }
    .day-header:first-child { margin-top: 0; }

    /* Modal */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: none; align-items: flex-end; justify-content: center; z-index: 50;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--card); width: 100%; max-width: 560px;
      border-radius: 24px 24px 0 0; padding: 24px 20px 32px;
      animation: slideup 0.2s ease;
    }
    @keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal h3 { margin: 0 0 18px; font-size: 1.15rem; }
    .field { margin-bottom: 16px; }
    .field label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--muted); }
    .seg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .seg button {
      padding: 14px; border-radius: 12px; border: 2px solid var(--card-soft);
      background: var(--card-soft); color: var(--text); font-size: 1rem; cursor: pointer;
      font-weight: 600;
    }
    .seg button.sel-sleep { border-color: var(--sleep); background: rgba(99,102,241,0.2); }
    .seg button.sel-wake  { border-color: var(--wake); background: rgba(245,158,11,0.2); }
    input[type="time"] {
      width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--card-soft);
      background: var(--card-soft); color: var(--text); font-size: 1.1rem;
    }
    .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
    .modal-actions button {
      padding: 15px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    .btn-cancel { background: var(--card-soft); color: var(--text); }
    .btn-save { background: var(--sleep-dark); color: #fff; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #fff; color: #0f172a; padding: 12px 20px; border-radius: 999px;
      font-weight: 600; font-size: 0.9rem; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      opacity: 0; transition: all 0.25s ease; z-index: 60; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>
  <header>
    <h1>🌙 Lenn's Schlaf-Tracker</h1>
    <p>Wann schläft und wacht Lenn?</p>
  </header>

  <div class="status" id="status">Noch keine Einträge</div>

  <div class="buttons">
    <button class="action btn-sleep" onclick="quickLog('sleep')">
      <span class="icon">😴</span> Eingeschlafen
    </button>
    <button class="action btn-wake" onclick="quickLog('wake')">
      <span class="icon">☀️</span> Aufgewacht
    </button>
    <button class="action btn-manual" onclick="openModal()">
      <span class="icon">✏️</span> Zeit manuell eintragen
    </button>
  </div>

  <h2>Schlaf- & Wachzeiten (letzte 24 Std)</h2>
  <div class="chart-card">
    <div class="chart-legend">
      <span><span class="swatch sleep"></span> Schläft</span>
      <span><span class="swatch wake"></span> Wach</span>
    </div>
    <div class="timeline" id="timeline"></div>
    <div class="axis" id="axis"></div>
    <div class="chart-empty" id="chartEmpty" style="display:none;">Noch keine Daten für die Grafik</div>
  </div>

  <h2>Verlauf</h2>
  <div id="list"></div>

  <!-- Manual entry modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h3>Zeit manuell eintragen</h3>
      <div class="field">
        <label>Was?</label>
        <div class="seg">
          <button type="button" id="segSleep" onclick="selectType('sleep')">😴 Eingeschlafen</button>
          <button type="button" id="segWake" onclick="selectType('wake')">☀️ Aufgewacht</button>
        </div>
      </div>
      <div class="field">
        <label>Um wie viel Uhr?</label>
        <input type="time" id="manualTime" step="300">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
        <button class="btn-save" onclick="saveManual()">Speichern</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'schlaf-tracker-entries';
    const FIVE_MIN = 1000 * 60 * 5;
    let entries = load();
    let manualType = 'sleep';

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch (e) { return []; }
    }
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    // Round a Date to the nearest 5 minutes
    function round5(d) {
      return new Date(Math.round(d.getTime() / FIVE_MIN) * FIVE_MIN);
    }

    function quickLog(type) {
      const t = round5(new Date());
      addEntry(type, t.toISOString());
      const label = type === 'sleep' ? 'Eingeschlafen' : 'Aufgewacht';
      showToast(label + ' um ' + formatTime(t.toISOString()) + ' ✓');
    }

    function addEntry(type, iso) {
      entries.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2), type, time: iso });
      entries.sort((a, b) => new Date(b.time) - new Date(a.time));
      save();
      render();
    }

    function deleteEntry(id) {
      entries = entries.filter(e => e.id !== id);
      save();
      render();
    }

    // Modal
    function openModal() {
      manualType = 'sleep';
      selectType('sleep');
      const now = round5(new Date());
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('manualTime').value = pad(now.getHours()) + ':' + pad(now.getMinutes());
      document.getElementById('overlay').classList.add('open');
    }
    function closeModal() {
      document.getElementById('overlay').classList.remove('open');
    }
    function selectType(type) {
      manualType = type;
      document.getElementById('segSleep').className = type === 'sleep' ? 'sel-sleep' : '';
      document.getElementById('segWake').className = type === 'wake' ? 'sel-wake' : '';
    }
    function saveManual() {
      const val = document.getElementById('manualTime').value;
      if (!val) { showToast('Bitte eine Uhrzeit wählen'); return; }
      const [h, m] = val.split(':').map(Number);
      const d = new Date();
      d.setHours(h, m, 0, 0);
      const rounded = round5(d);
      addEntry(manualType, rounded.toISOString());
      closeModal();
      showToast('Eintrag gespeichert ✓');
    }

    // Rendering
    function render() {
      const list = document.getElementById('list');
      if (entries.length === 0) {
        list.innerHTML = '<div class="empty">Noch keine Einträge.<br>Tippe auf einen Button oben, um zu starten.</div>';
      } else {
        let html = '';
        let lastDay = null;
        for (const e of entries) {
          const day = dayLabel(e.time);
          if (day !== lastDay) {
            html += '<div class="day-header">' + day + '</div>';
            lastDay = day;
          }
          const isSleep = e.type === 'sleep';
          html += `
            <div class="entry">
              <div class="dot ${isSleep ? 'sleep' : 'wake'}">${isSleep ? '😴' : '☀️'}</div>
              <div class="info">
                <div class="type">${isSleep ? 'Eingeschlafen' : 'Aufgewacht'}</div>
                <div class="time">${formatTime(e.time)}</div>
              </div>
              <button class="del" onclick="deleteEntry('${e.id}')" aria-label="Löschen">🗑</button>
            </div>`;
        }
        list.innerHTML = html;
      }
      renderChart();
      renderStatus();
    }

    function renderStatus() {
      const status = document.getElementById('status');
      status.className = 'status';
      if (entries.length === 0) {
        status.textContent = 'Noch keine Einträge';
        return;
      }
      const last = entries[0]; // newest
      const isSleep = last.type === 'sleep';
      const since = new Date(last.time);
      const dur = formatDuration(Date.now() - since.getTime());
      status.classList.add(isSleep ? 'sleeping' : 'awake');
      status.innerHTML =
        `<div class="big">${isSleep ? '😴 Lenn schläft' : '☀️ Lenn ist wach'}</div>` +
        `<div class="duration">seit ${dur}</div>` +
        `<div class="sub">${isSleep ? 'Eingeschlafen' : 'Aufgewacht'} um ${formatTime(last.time)}</div>`;
    }

    // Sleep/wake timeline for the last 24 hours
    function renderChart() {
      const timeline = document.getElementById('timeline');
      const axis = document.getElementById('axis');
      const emptyEl = document.getElementById('chartEmpty');
      const now = Date.now();
      const windowMs = 24 * 60 * 60 * 1000;
      const start = now - windowMs;

      if (entries.length === 0) {
        timeline.innerHTML = '';
        axis.innerHTML = '';
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';

      // entries are newest-first; work with ascending order
      const asc = [...entries].sort((a, b) => new Date(a.time) - new Date(b.time));

      // Build segments [from, to, state] across the whole history, then clip to window.
      const segs = [];
      // State before the first event = opposite of that first event
      const firstT = new Date(asc[0].time).getTime();
      const beforeState = asc[0].type === 'sleep' ? 'wake' : 'sleep';
      segs.push({ from: start, to: firstT, state: beforeState });
      for (let i = 0; i < asc.length; i++) {
        const from = new Date(asc[i].time).getTime();
        const to = i + 1 < asc.length ? new Date(asc[i + 1].time).getTime() : now;
        const state = asc[i].type === 'sleep' ? 'sleep' : 'wake';
        segs.push({ from, to, state });
      }

      let html = '';
      for (const s of segs) {
        const from = Math.max(s.from, start);
        const to = Math.min(s.to, now);
        if (to <= from) continue;
        const left = ((from - start) / windowMs) * 100;
        const width = ((to - from) / windowMs) * 100;
        html += `<div class="seg-block ${s.state}" style="left:${left}%;width:${width}%"></div>`;
      }
      timeline.innerHTML = html;

      // Hour ticks every 6 hours
      let ticks = '';
      for (let i = 0; i <= 4; i++) {
        const t = new Date(start + (windowMs * i) / 4);
        const pct = i * 25;
        const label = t.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        ticks += `<span class="tick" style="left:${pct}%">${label}</span>`;
      }
      axis.innerHTML = ticks;
    }

    // Helpers
    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) + ' Uhr';
    }
    function formatDuration(ms) {
      if (ms < 0) ms = 0;
      const totalMin = Math.floor(ms / 60000);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      if (h === 0) return m + ' Min';
      if (m === 0) return h + ' Std';
      return h + ' Std ' + m + ' Min';
    }
    function dayLabel(iso) {
      const d = new Date(iso);
      const today = new Date();
      const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
      if (sameDay(d, today)) return 'Heute';
      if (sameDay(d, yesterday)) return 'Gestern';
      return d.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    function sameDay(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    // Close modal when tapping overlay background
    document.getElementById('overlay').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });

    render();
    // Keep live duration + chart fresh
    setInterval(() => { renderStatus(); renderChart(); }, 30000);
  </script>
</body>
</html>
